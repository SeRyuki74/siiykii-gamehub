<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIIYKII Snake Game</title>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
    color:#38bdf8;
}

#gameContainer{
    margin:auto;
    margin-top:20px;
    width:420px;
    background:#111827;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

canvas{
    background:#1e293b;
    border:4px solid #38bdf8;
    border-radius:10px;
}

#score{
    margin-top:15px;
    font-size:22px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#0ea5e9;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0284c7;
}

.controls{
    margin-top:20px;
}

.controls button{
    width:70px;
    height:70px;
    font-size:25px;
    margin:5px;
}

@media(max-width:600px){
    #gameContainer{
        width:95%;
        padding:10px;
    }

    canvas{
        width:100%;
        height:auto;
    }
}
</style>
</head>

<body>

<h1>🐍 SIIYKII Snake Game</h1>

<div id="gameContainer">

<canvas id="game" width="400" height="400"></canvas>

<div id="score">Score: 0</div>

<button onclick="restartGame()">Restart Game</button>

<div class="controls">
    <div>
        <button onclick="changeDirection('UP')">⬆️</button>
    </div>
    <div>
        <button onclick="changeDirection('LEFT')">⬅️</button>
        <button onclick="changeDirection('DOWN')">⬇️</button>
        <button onclick="changeDirection('RIGHT')">➡️</button>
    </div>
</div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
const canvasSize = 400;

let snake = [{x: 200, y: 200}];
let direction = "RIGHT";

let food = {
    x: Math.floor(Math.random()*20)*box,
    y: Math.floor(Math.random()*20)*box
};

let score = 0;

document.addEventListener("keydown", event => {
    if(event.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    else if(event.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
    else if(event.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    else if(event.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
});

function changeDirection(dir){
    if(dir === "UP" && direction !== "DOWN") direction = "UP";
    if(dir === "DOWN" && direction !== "UP") direction = "DOWN";
    if(dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
    if(dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
}

function draw(){

    ctx.fillStyle = "#1e293b";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    // Snake
    for(let i=0;i<snake.length;i++){
        ctx.fillStyle = i === 0 ? "#38bdf8" : "#22c55e";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
    }

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(direction === "UP") headY -= box;
    if(direction === "DOWN") headY += box;
    if(direction === "LEFT") headX -= box;
    if(direction === "RIGHT") headX += box;

    // Eat food
    if(headX === food.x && headY === food.y){
        score++;
        document.getElementById("score").innerText = "Score: " + score;

        food = {
            x: Math.floor(Math.random()*20)*box,
            y: Math.floor(Math.random()*20)*box
        };

    } else {
        snake.pop();
    }

    let newHead = {x: headX, y: headY};

    // Collision
    if(
        headX < 0 || headY < 0 ||
        headX >= canvasSize || headY >= canvasSize ||
        snake.some(segment => segment.x === headX && segment.y === headY)
    ){
        clearInterval(game);
        alert("Game Over! Score: " + score);
    }

    snake.unshift(newHead);
}

function restartGame(){
    snake = [{x: 200, y: 200}];
    direction = "RIGHT";
    score = 0;
    document.getElementById("score").innerText = "Score: 0";

    food = {
        x: Math.floor(Math.random()*20)*box,
        y: Math.floor(Math.random()*20)*box
    };

    clearInterval(game);
    game = setInterval(draw, 120);
}

let game = setInterval(draw, 120);
</script>

</body>
</html>
