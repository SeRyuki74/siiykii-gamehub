<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIIYKII Ultra Worm</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.9)),
#020617;
overflow:hidden;
color:white;
}

.container{
width:95%;
max-width:950px;
padding:25px;
border-radius:35px;
background:rgba(15,23,42,.8);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 45px rgba(56,189,248,.25);
text-align:center;
}

h1{
font-size:56px;
color:#38bdf8;
text-shadow:0 0 25px #38bdf8;
margin-bottom:10px;
}

.sub{
margin-bottom:25px;
opacity:.8;
}

.top{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.box{
padding:18px 30px;
background:rgba(2,6,23,.8);
border-radius:20px;
min-width:220px;
box-shadow:0 0 20px rgba(56,189,248,.2);
}

.box h3{
font-size:14px;
opacity:.7;
margin-bottom:8px;
}

.box p{
font-size:32px;
font-weight:bold;
}

canvas{
background:#020617;
border:4px solid #38bdf8;
border-radius:25px;
box-shadow:0 0 40px rgba(56,189,248,.45);
max-width:100%;
}

.buttons{
margin-top:20px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button{
padding:14px 28px;
border:none;
border-radius:16px;
background:#0ea5e9;
color:white;
font-family:'Orbitron';
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px rgba(14,165,233,.5);
}

button:hover{
transform:scale(1.08);
}

.controls{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.row{
display:flex;
gap:10px;
}

.ctrl{
width:70px;
height:70px;
font-size:28px;
border-radius:18px;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(2,6,23,.96);
padding:35px;
border-radius:30px;
border:2px solid #ff4fd8;
box-shadow:0 0 45px rgba(255,79,216,.5);
display:none;
z-index:999;
}

.popup h2{
font-size:40px;
margin-bottom:15px;
color:#ff4fd8;
}

.popup p{
margin-bottom:20px;
line-height:1.8;
}

@media(max-width:768px){

h1{
font-size:38px;
}

.ctrl{
width:60px;
height:60px;
font-size:24px;
}

}
</style>
</head>

<body>

<div class="container">

<h1>🐍 ULTRA WORM</h1>
<p class="sub">Smooth Slither Edition • SIIYKII HUB</p>

<div class="top">

<div class="box">
<h3>SCORE</h3>
<p id="score">0</p>
</div>

<div class="box">
<h3>HIGH SCORE</h3>
<p id="highscore">0</p>
</div>

</div>

<canvas id="game" width="700" height="700"></canvas>

<div class="buttons">
<button onclick="restartGame()">RESTART</button>
<button onclick="window.location.href='index.html'">BACK HUB</button>
</div>

<div class="controls">

<div class="row">
<button class="ctrl" onclick="changeDirection('UP')">⬆️</button>
</div>

<div class="row">
<button class="ctrl" onclick="changeDirection('LEFT')">⬅️</button>
<button class="ctrl" onclick="changeDirection('DOWN')">⬇️</button>
<button class="ctrl" onclick="changeDirection('RIGHT')">➡️</button>
</div>

</div>

</div>

<div class="popup" id="popup">
<h2>💀 GAME OVER</h2>
<p id="final"></p>
<button onclick="restartGame()">PLAY AGAIN</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
const size = 700;

let snake = [];

for(let i=0;i<25;i++){
snake.push({
x:350-(i*10),
y:350
});
}

let direction = "RIGHT";

let food = randomFood();

let score = 0;

let high = localStorage.getItem("wormHigh") || 0;

document.getElementById("highscore").innerText = high;

function randomFood(){

return{
x:Math.floor(Math.random()*30)*grid+10,
y:Math.floor(Math.random()*30)*grid+10
};

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp" && direction!=="DOWN") direction="UP";
if(e.key==="ArrowDown" && direction!=="UP") direction="DOWN";
if(e.key==="ArrowLeft" && direction!=="RIGHT") direction="LEFT";
if(e.key==="ArrowRight" && direction!=="LEFT") direction="RIGHT";

});

function changeDirection(dir){

if(dir==="UP" && direction!=="DOWN") direction="UP";
if(dir==="DOWN" && direction!=="UP") direction="DOWN";
if(dir==="LEFT" && direction!=="RIGHT") direction="LEFT";
if(dir==="RIGHT" && direction!=="LEFT") direction="RIGHT";

}

function drawBackground(){

ctx.fillStyle="#020617";
ctx.fillRect(0,0,size,size);

for(let i=0;i<size;i+=grid){

ctx.strokeStyle="rgba(255,255,255,.03)";

ctx.beginPath();
ctx.moveTo(i,0);
ctx.lineTo(i,size);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0,i);
ctx.lineTo(size,i);
ctx.stroke();

}

}

function drawFood(){

ctx.beginPath();

ctx.shadowBlur=25;
ctx.shadowColor="#ff4fd8";

ctx.fillStyle="#ff4fd8";

ctx.arc(food.x,food.y,10,0,Math.PI*2);

ctx.fill();

ctx.shadowBlur=0;

}

function drawSnake(){

for(let i=snake.length-1;i>=0;i--){

const part = snake[i];

let radius = 20 - (i * 0.5);

if(radius < 4){
radius = 4;
}

let gradient = ctx.createRadialGradient(
part.x,
part.y,
2,
part.x,
part.y,
radius
);

gradient.addColorStop(0,"#ffffff");
gradient.addColorStop(1,"#cbd5e1");

ctx.beginPath();

ctx.fillStyle = gradient;

ctx.shadowBlur = 20;
ctx.shadowColor = "#60a5fa";

ctx.arc(part.x,part.y,radius,0,Math.PI*2);

ctx.fill();

ctx.shadowBlur = 0;

}

/* HEAD */
const head = snake[0];

ctx.beginPath();

ctx.fillStyle="#ffffff";

ctx.shadowBlur=35;
ctx.shadowColor="#38bdf8";

ctx.arc(head.x,head.y,24,0,Math.PI*2);

ctx.fill();

ctx.shadowBlur=0;

/* EYES */
let eyeX1=head.x-8;
let eyeY1=head.y-6;

let eyeX2=head.x+8;
let eyeY2=head.y-6;

if(direction==="UP"){
eyeY1=head.y-11;
eyeY2=head.y-11;
}

if(direction==="DOWN"){
eyeY1=head.y+7;
eyeY2=head.y+7;
}

if(direction==="LEFT"){
eyeX1=head.x-11;
eyeX2=head.x-11;
}

if(direction==="RIGHT"){
eyeX1=head.x+11;
eyeX2=head.x+11;
}

ctx.beginPath();
ctx.fillStyle="white";
ctx.arc(eyeX1,eyeY1,6,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(eyeX2,eyeY2,6,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.fillStyle="black";
ctx.arc(eyeX1,eyeY1,2.5,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(eyeX2,eyeY2,2.5,0,Math.PI*2);
ctx.fill();

}

function update(){

let headX = snake[0].x;
let headY = snake[0].y;

if(direction==="UP") headY-=grid;
if(direction==="DOWN") headY+=grid;
if(direction==="LEFT") headX-=grid;
if(direction==="RIGHT") headX+=grid;

const newHead = {
x:headX,
y:headY
};

if(
headX<0 ||
headY<0 ||
headX>size ||
headY>size ||
snake.slice(1).some(seg =>
Math.hypot(seg.x-headX,seg.y-headY)<10
)
){

clearInterval(game);

document.getElementById("final").innerHTML =
"SCORE : <b>"+score+"</b><br>HIGH SCORE : <b>"+high+"</b>";

document.getElementById("popup").style.display="block";

return;

}

snake.unshift(newHead);

if(
Math.hypot(food.x-headX,food.y-headY)<22
){

score++;

document.getElementById("score").innerText=score;

food=randomFood();

if(score>high){

high=score;

localStorage.setItem("wormHigh",high);

document.getElementById("highscore").innerText=high;

}

}else{

snake.pop();

}

}

function draw(){

drawBackground();

drawFood();

drawSnake();

update();

}

function restartGame(){

snake=[];

for(let i=0;i<25;i++){
snake.push({
x:350-(i*10),
y:350
});
}

direction="RIGHT";

score=0;

document.getElementById("score").innerText=0;

food=randomFood();

document.getElementById("popup").style.display="none";

clearInterval(game);

game=setInterval(draw,70);

}

let game = setInterval(draw,70);

</script>

</body>
</html>
