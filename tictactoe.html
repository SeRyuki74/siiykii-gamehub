<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIIYKII Tic Tac Toe</title>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
    color:#38bdf8;
}

.container{
    margin:auto;
    margin-top:30px;
    width:360px;
    background:#111827;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#status{
    font-size:22px;
    margin-bottom:20px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
    justify-content:center;
}

.cell{
    width:100px;
    height:100px;
    background:#1e293b;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    cursor:pointer;
    transition:0.3s;
}

.cell:hover{
    background:#334155;
}

button{
    margin-top:20px;
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#0ea5e9;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0284c7;
}

@media(max-width:500px){
    .container{
        width:95%;
        padding:10px;
    }

    .board{
        grid-template-columns:repeat(3,80px);
    }

    .cell{
        width:80px;
        height:80px;
        font-size:32px;
    }
}
</style>
</head>

<body>

<h1>❌⭕ SIIYKII Tic Tac Toe</h1>

<div class="container">

<div id="status">Player X Turn</div>

<div class="board" id="board"></div>

<button onclick="restartGame()">Restart Game</button>

</div>

<script>
let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameOver = false;

const boardElement = document.getElementById("board");
const statusText = document.getElementById("status");

function createBoard(){
    boardElement.innerHTML = "";

    board.forEach((cell,index)=>{
        const div = document.createElement("div");
        div.classList.add("cell");
        div.innerText = cell;

        div.addEventListener("click",()=>makeMove(index));

        boardElement.appendChild(div);
    });
}

function makeMove(index){

    if(board[index] !== "" || gameOver) return;

    board[index] = currentPlayer;

    createBoard();

    if(checkWinner()){
        statusText.innerText = "🎉 Player " + currentPlayer + " Wins!";
        gameOver = true;
        return;
    }

    if(board.every(cell => cell !== "")){
        statusText.innerText = "🤝 Draw Game!";
        gameOver = true;
        return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";

    statusText.innerText = "Player " + currentPlayer + " Turn";
}

function checkWinner(){

    const wins = [
        [0,1,2],
        [3,4,5],
        [6,7,8],
        [0,3,6],
        [1,4,7],
        [2,5,8],
        [0,4,8],
        [2,4,6]
    ];

    return wins.some(combo=>{
        return combo.every(index=>board[index] === currentPlayer);
    });
}

function restartGame(){
    board = ["","","","","","","","",""];
    currentPlayer = "X";
    gameOver = false;
    statusText.innerText = "Player X Turn";
    createBoard();
}

createBoard();
</script>

</body>
</html>
